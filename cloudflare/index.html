<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Munnesir</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Tinos:ital,wght@0,400;0,700;1,400&family=Open+Sans:wght@400;600&display=swap">
</head>
<body>

  <!-- SABİT SOL MENÜ (1.1, 1.2, 1.7) -->
  <aside class="sidebar" id="sidebar">
    <div class="brand-header">
      <div class="brand-top">
        <img src="icons/m-cir.png" alt="Munnesir Logo" class="brand-logo">
        <h1 class="brand-title">Munnesir</h1>
      </div>
      <p class="brand-subtitle">hayata yeni yelkenler açmaya çalışan bir oluşum</p>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-btn" id="btnSearch" type="button">🔍 Arama</button>
      
      <div class="nav-section">
        <span class="nav-section-title">Etiketler</span>
        <div id="tagCloud" class="tagCloud"></div>
      </div>

      <div class="nav-section">
        <span class="nav-section-title">Durum</span>
        <div id="statusFilters" class="status-filters">
          <button class="nav-btn active" data-status="all">Tümü</button>
          <button class="nav-btn" data-status="draft">Taslak</button>
          <button class="nav-btn" data-status="ready">Yayına hazır</button>
          <button class="nav-btn" data-status="archive">Arşiv</button>
          <button class="nav-btn" data-status="favorite">★ Seçmeler</button>
        </div>
      </div>

      <div class="nav-section">
        <button class="nav-btn" id="bookViewBtn" type="button">📚 Kitap Adayları</button>
        <div class="active-books-container" id="activeBooksContainer"></div>
      </div>

      <button class="nav-btn" id="trashViewBtn" type="button">🗑 Çöp Kutusu</button>
    </nav>
  </aside>

  <!-- ANA İÇERİK -->
  <main class="main-content">
    <header class="top-banner">
      <div class="banner-left">
        <button class="hamburger-toggle" id="hamburgerToggle" type="button">☰</button>
      </div>

      <!-- Keep Notları Tarzı + Butonu (1.3) -->
      <button class="add-poem-btn" id="btnNewPoem" type="button" title="Yeni Şiir Ekle">+</button>

      <!-- Sağ Ayarlar Sembolü (1.4) -->
      <div class="banner-right">
        <button class="settings-toggle-btn" id="btnOpenSettings" type="button" title="Ayarlar">⚙</button>
      </div>
    </header>

    <div class="active-filters-bar" id="activeFilters"></div>

    <section class="poetry-feed" id="poemGrid"></section>
  </main>

  <!-- AYARLAR PANELİ (1.4, 1.5, 1.6) Pop-up'sız İç Kaplama -->
  <div class="settings-panel" id="settingsPanel">
    <div class="panel-header">
      <h2>Ayarlar</h2>
      <button class="panel-close-btn" id="btnCloseSettings" type="button">✕</button>
    </div>

    <div class="settings-menu-list">
      <button class="setting-item active" data-tab="set-theme">Tema</button>
      <button class="setting-item" data-tab="set-font">Font</button>
      <button class="setting-item" data-tab="set-sync">Senkronizasyon</button>
      <button class="setting-item" data-tab="set-export">İçe / Dışa Aktar</button>
    </div>

    <div class="settings-subcontent">
      <div class="sub-page active" id="set-theme">
        <h3>Tema Seçimi</h3>
        <div class="theme-options">
          <button class="themeChoice" data-theme-choice="purple">Mor (Varsayılan)</button>
          <button class="themeChoice" data-theme-choice="light">Aydınlık</button>
          <button class="themeChoice" data-theme-choice="black">Siyah</button>
        </div>
      </div>

      <div class="sub-page" id="set-font">
        <h3>Yazılacak Yer Fontu</h3>
        <p class="font-desc">Değişiklik yalnızca şiir metinlerinde anlık olarak görünür.</p>
        <select id="globalFontSelect" class="font-select">
          <option value="font-times">Times New Roman</option>
          <option value="font-roboto">Roboto</option>
          <option value="font-google-sans">Google Sans</option>
        </select>
      </div>

      <div class="sub-page" id="set-sync">
        <h3>Bulut Senkronizasyonu</h3>
        <p id="syncStatusText">Giriş bekleniyor...</p>
        <div class="sync-actions-block">
          <input type="password" id="syncPasswordInput" placeholder="Munnesir Şifresi" class="textInput" />
          <button id="syncSignInBtn" class="primaryBtn" type="button">Giriş Yap</button>
          <button id="syncNowBtn" class="primaryBtn" type="button">Şimdi Senkronize Et</button>
        </div>
      </div>

      <div class="sub-page" id="set-export">
        <h3>İçe ve Dışa Aktar</h3>
        <button id="exportJsonBtn" class="primaryBtn" type="button">Yedek İndir (JSON)</button>
        <input type="file" id="importJsonInput" accept=".json" hidden />
        <button id="triggerImportBtn" class="ghostBtn" type="button">Yedek Yükle</button>
      </div>
    </div>
  </div>

  <!-- TAM EKRAN ŞİİR YAZMA PANELİ (2.1) -->
  <dialog id="poemDialog" class="poem-editor-dialog modal-backdrop">
    <form method="dialog" class="poem-editor-container">
      <div class="editor-header">
        <input type="text" id="poemTitle" class="poem-title-input" placeholder="Şiir Başlığı..." />
        <button type="button" class="editor-close-btn" id="closePoemDialogBtn">✕</button>
      </div>

      <textarea id="poemContent" class="poem-body-textarea font-times" placeholder="Mısralarınızı buraya yazın..."></textarea>

      <div class="editor-footer">
        <select id="editorFontSelect" class="font-select-sm">
          <option value="font-times">Times New Roman</option>
          <option value="font-roboto">Roboto</option>
          <option value="font-google-sans">Google Sans</option>
        </select>
        <button type="submit" id="savePoemBtn" class="save-poem-btn">Kaydet</button>
      </div>
    </form>
  </dialog>

  <!-- ŞİİR OKUMA PANELİ -->
  <dialog id="readerDialog" class="modal-backdrop">
    <div class="reader-container">
      <div class="editor-header">
        <h2 id="readerTitle"></h2>
        <button type="button" class="editor-close-btn" id="closeReaderBtn">✕</button>
      </div>
      <div id="readerMeta" class="cardMeta"></div>
      <div id="readerTags" class="cardTags"></div>
      <pre id="readerContent" class="reader-content font-times"></pre>
    </div>
  </dialog>

  <script type="module" src="app.js"></script>
  <script src="sync.js"></script>
</body>
</html>
